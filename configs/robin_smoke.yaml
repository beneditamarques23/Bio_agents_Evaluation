# Robin smoke test — one disease, one framework, one model.
# Requires: uv sync --extra robin
#
# Standard mode: FUTUREHOUSE_API_KEY in .env required.
# Lite mode    : no FUTUREHOUSE_API_KEY needed — set lite_mode: true below
#               and use PubMed + the local LLM for all literature steps.

tasks:
  - assay_generation

frameworks:
  - robin

models:
  - llama3               # local Ollama — no key needed, run: ollama pull llama3
  # - ministral-8b-cloud # Ollama Cloud free tier — ollama signin
  # - gemini-2.0-flash   # Google free tier — GOOGLE_API_KEY
  # - llama-3.3-70b      # Groq free tier — GROQ_API_KEY
  # - o4-mini            # OpenAI — OPENAI_API_KEY
  # - claude-sonnet-4-6  # Anthropic — ANTHROPIC_API_KEY

eval:
  - success_rate

# Robin-specific kwargs — keep small for a quick smoke test
num_queries: 1
num_assays: 2
num_candidates: 2

# Lite mode: replaces FutureHouse API calls with PubMed + local LLM.
# Set to true to run without a FUTUREHOUSE_API_KEY.
lite_mode: false

output_dir: results/robin_smoke
